<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TabTidy</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <strong>TabTidy</strong>
        <span>Keep tabs tidy.</span>
      </header>
      <button id="newRight" type="button">New tab to right</button>
      <button id="openBoard" type="button">Open tab board</button>
      <p class="hint">Shortcuts: Command+Shift+Y and Command+Shift+U</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
