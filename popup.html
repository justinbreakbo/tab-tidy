<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TabTidy</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <strong>TabTidy</strong>
        <span>保持标签页整洁。</span>
      </header>
      <button id="newRight" type="button">右侧新建标签页</button>
      <button id="duplicateRight" type="button">右侧复制当前标签页</button>
      <button id="openBoard" type="button">打开标签页管理面板</button>
      <p class="hint">快捷键：Command+Shift+Y、Command+Shift+H、Command+Shift+U</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
